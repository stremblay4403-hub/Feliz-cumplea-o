<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Nini ❤️</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="background">

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>

</div>

<div id="intro">

    <h1>Aqui es un regalo para ti ❤️</h1>

    <p id="instruction">
        Click on Snoopy 
    </p>

</div>

<div id="scene">

    <div id="snoopyContainer">

        <img
        src="snoopy.png"
        id="snoopy"
        draggable="false">

        <img
        src="letter.png"
        id="letter"
        draggable="false">

    </div>

</div>

<!-- Lettre -->

<div id="messageOverlay">

    <div id="envelopeContainer">

        <div id="envelope">

            <div id="paper">

                <h2>❤️ Feliz Cumpleanos Nini ❤️</h2>

                <div id="birthdayText"></div>

                <div id="hearts">
                    ❤️ ❤️
                </div>

                <button id="closeButton">
                    Cerrar ❤️
                </button>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
