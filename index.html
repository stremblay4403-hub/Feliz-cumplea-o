<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Un regalo para Nini ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="background">

<div id="cloud1"></div>
<div id="cloud2"></div>
<div id="cloud3"></div>

</div>

<div id="intro">

<h1>Aqui es un regalo para ti Nini❤️</h1>

<p id="instruction">
Click on Snoopy 
</p>

</div>

<div id="scene">

    <!-- Conteneur qui déplacera Snoopy -->
    <div id="snoopyContainer">

        <img
        src="snoopy.png"
        id="snoopy"
        draggable="false">

        <!-- Lettre attachée au torse -->
        <img
        src="letter.png"
        id="letter"
        draggable="false">

    </div>

</div>

<!-- Fenêtre du message -->

<div id="messageOverlay">

    <div id="paper">

        <h2>❤️ Feliz Cumpleaños Nini ❤️</h2>

        <div id="birthdayText">

        </div>

        <button id="closeButton">

            Close ❤️

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
